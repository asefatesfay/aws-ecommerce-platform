events {
    worker_connections 1024;
}

http {
    upstream auth        { server auth:8000; }
    upstream catalog     { server catalog:8000; }
    upstream cart        { server cart:8000; }
    upstream order       { server order:8000; }
    upstream payment     { server payment:8000; }
    upstream search      { server search:8000; }
    upstream recommendation { server recommendation:8000; }
    upstream inventory   { server inventory:8000; }
    upstream admin       { server admin:8000; }
    upstream frontend    { server frontend:3000; }

    server {
        listen 80;
        server_name localhost;

        # ── API routes ──────────────────────────────────────────────────
        location /auth/       { proxy_pass http://auth/auth/;       proxy_set_header Host $host; }
        location /catalog/    { proxy_pass http://catalog/catalog/;  proxy_set_header Host $host; }
        location /cart/       { proxy_pass http://cart/cart/;        proxy_set_header Host $host; }
        location /orders/     { proxy_pass http://order/orders/;     proxy_set_header Host $host; }
        location /payments/   { proxy_pass http://payment/payments/; proxy_set_header Host $host; }
        location /search/     { proxy_pass http://search/search/;    proxy_set_header Host $host; }
        location /recommendations/ { proxy_pass http://recommendation/recommendations/; proxy_set_header Host $host; }
        location /inventory/  { proxy_pass http://inventory/inventory/; proxy_set_header Host $host; }
        location /admin/      { proxy_pass http://admin/admin/;      proxy_set_header Host $host; }

        # Health checks per service
        location ~ ^/health/(.+)$ {
            proxy_pass http://$1/health;
            proxy_set_header Host $host;
        }

        # ── Frontend (catch-all) ────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
