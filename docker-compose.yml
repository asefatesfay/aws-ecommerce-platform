services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,dynamodb,secretsmanager
      DEFAULT_REGION: us-east-1
      DOCKER_HOST: unix:///var/run/docker.sock
      DEBUG: 0
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"running\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Shared env anchors ──────────────────────────────────────────────────────
  # These are referenced by services below via YAML anchors

  # ── Microservices ───────────────────────────────────────────────────────────

  auth:
    build:
      context: services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      SERVICE_NAME: auth-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./services/auth/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  catalog:
    build:
      context: services/catalog
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      SERVICE_NAME: catalog-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      PRODUCT_EVENTS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:ecommerce-dev-product-events
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./services/catalog/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cart:
    build:
      context: services/cart
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      SERVICE_NAME: cart-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      DYNAMODB_CART_TABLE: ecommerce-dev-cart
      INVENTORY_SERVICE_URL: http://inventory:8000
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./services/cart/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  order:
    build:
      context: services/order
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      SERVICE_NAME: order-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      ORDER_EVENTS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:ecommerce-dev-order-events
      PAYMENT_SERVICE_URL: http://payment:8000
      INVENTORY_SERVICE_URL: http://inventory:8000
      ORDER_PAYMENT_QUEUE_URL: http://localstack:4566/000000000000/ecommerce-dev-order-payment-queue
    depends_on:
      localstack:
        condition: service_healthy
      inventory:
        condition: service_healthy
    volumes:
      - ./services/order/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  payment:
    build:
      context: services/payment
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      SERVICE_NAME: payment-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      PAYMENT_EVENTS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:ecommerce-dev-payment-events
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      ORDER_SERVICE_URL: http://order:8000
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./services/payment/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  search:
    build:
      context: services/search
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      SERVICE_NAME: search-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      OPENSEARCH_URL: http://opensearch:9200
      SEARCH_QUEUE_URL: http://localstack:4566/000000000000/ecommerce-dev-search-product-queue
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./services/search/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  recommendation:
    build:
      context: services/recommendation
      dockerfile: Dockerfile
    ports:
      - "8007:8000"
    environment:
      SERVICE_NAME: recommendation-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./services/recommendation/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  inventory:
    build:
      context: services/inventory
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    environment:
      SERVICE_NAME: inventory-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      INVENTORY_EVENTS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:ecommerce-dev-inventory-events
      INVENTORY_QUEUE_URL: http://localstack:4566/000000000000/ecommerce-dev-inventory-order-confirmed-queue
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./services/inventory/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: services/admin
      dockerfile: Dockerfile
    ports:
      - "8009:8000"
    environment:
      SERVICE_NAME: admin-service
      DATABASE_URL: sqlite+aiosqlite:///./dev.db
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./services/admin/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://nginx
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_CLOUDFRONT_DOMAIN: http://localhost
    depends_on:
      catalog:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth
      - catalog
      - cart
      - order
      - payment
      - search
      - recommendation
      - inventory
      - admin

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  opensearch_data:
